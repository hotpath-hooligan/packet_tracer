# Expected result: the ping fails while User-PC ARPs for the incorrect default
# gateway 10.10.10.254 instead of the router at 10.10.10.1.
topology:
  name: "Default Gateway Misconfiguration"
  description: "User-PC has a default route through an unused address on its local subnet, so remote traffic never reaches Gateway-RTR."
  summary: "User-PC default gateway 10.10.10.254 · Correct gateway is 10.10.10.1"
  default_source: "User-PC"
  default_destination: "App-SRV"
  canvas:
    width: 1000
    height: 520

nodes:
  - name: "User-PC"
    type: host
    position: {x: 140, y: 260}
    interfaces:
      - {name: "eth0", ip: "10.10.10.10", mask: 24}
    routes:
      - {destination: "0.0.0.0", mask: 0, gateway: "10.10.10.254", interface: "eth0"}

  - name: "Gateway-RTR"
    type: router
    position: {x: 500, y: 260}
    interfaces:
      - {name: "users", ip: "10.10.10.1", mask: 24}
      - {name: "servers", ip: "10.20.20.1", mask: 24}

  - name: "App-SRV"
    type: host
    position: {x: 860, y: 260}
    interfaces:
      - {name: "eth0", ip: "10.20.20.20", mask: 24}
    routes:
      - {destination: "0.0.0.0", mask: 0, gateway: "10.20.20.1", interface: "eth0"}

links:
  - {from_node: "User-PC", from_interface: "eth0", to_node: "Gateway-RTR", to_interface: "users", cost: 1}
  - {from_node: "Gateway-RTR", from_interface: "servers", to_node: "App-SRV", to_interface: "eth0", cost: 1}
