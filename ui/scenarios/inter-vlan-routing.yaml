# Expected result: Sales-PC receives a ping reply from Engineering-PC.
# Core-SW routes between VLAN 10 and VLAN 20 through its VLAN interfaces.
topology:
  name: "Inter-VLAN Routing"
  description: "The Layer 3 switch uses VLAN interfaces to route between the Sales and Engineering networks."
  summary: "Sales · VLAN 10 → Core-SW → Engineering · VLAN 20"
  default_source: "Sales-PC"
  default_destination: "Engineering-PC"
  canvas:
    width: 1000
    height: 520

nodes:
  - name: "Sales-PC"
    type: host
    position: {x: 180, y: 260}
    interfaces:
      - name: "eth0"
        ip: "192.168.10.10"
        mask: 24
    routes:
      - destination: "192.168.20.0"
        mask: 24
        gateway: "192.168.10.1"
        interface: "eth0"

  - name: "Core-SW"
    type: switch
    position: {x: 500, y: 260}
    vlan_interfaces:
      - vlan: 10
        ip: "192.168.10.1"
        mask: 24
      - vlan: 20
        ip: "192.168.20.1"
        mask: 24
    interfaces:
      - name: "sales-access"
        mode: access
        vlan: 10
      - name: "eng-access"
        mode: access
        vlan: 20

  - name: "Engineering-PC"
    type: host
    position: {x: 820, y: 260}
    interfaces:
      - name: "eth0"
        ip: "192.168.20.20"
        mask: 24
    routes:
      - destination: "192.168.10.0"
        mask: 24
        gateway: "192.168.20.1"
        interface: "eth0"

links:
  - from_node: "Sales-PC"
    from_interface: "eth0"
    to_node: "Core-SW"
    to_interface: "sales-access"
    cost: 1

  - from_node: "Core-SW"
    from_interface: "eng-access"
    to_node: "Engineering-PC"
    to_interface: "eth0"
    cost: 1
