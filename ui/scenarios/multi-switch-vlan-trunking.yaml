# Expected result: Sales-A receives a ping reply from Sales-B across the
# 802.1Q trunk while VLAN 10 remains isolated from VLAN 20.
topology:
  name: "Multi-Switch VLAN Trunking"
  description: "Two access switches extend VLANs 10 and 20 over an 802.1Q trunk with native VLAN 99."
  summary: "Sales-A · VLAN 10 → tagged trunk → Sales-B · Expected success"
  default_source: "Sales-A"
  default_destination: "Sales-B"
  canvas:
    width: 1200
    height: 620

nodes:
  - name: "Sales-A"
    type: host
    position: {x: 120, y: 160}
    interfaces:
      - name: "eth0"
        ip: "10.10.10.11"
        mask: 24

  - name: "Voice-A"
    type: host
    position: {x: 120, y: 450}
    interfaces:
      - name: "eth0"
        ip: "10.10.20.11"
        mask: 24

  - name: "Access-SW1"
    type: switch
    position: {x: 410, y: 300}
    interfaces:
      - {name: "sales", mode: access, vlan: 10}
      - {name: "voice", mode: access, vlan: 20}
      - {name: "uplink", mode: trunk, native_vlan: 99, allowed_vlans: [10, 20, 99]}

  - name: "Access-SW2"
    type: switch
    position: {x: 790, y: 300}
    interfaces:
      - {name: "uplink", mode: trunk, native_vlan: 99, allowed_vlans: [10, 20, 99]}
      - {name: "sales", mode: access, vlan: 10}
      - {name: "voice", mode: access, vlan: 20}

  - name: "Sales-B"
    type: host
    position: {x: 1080, y: 160}
    interfaces:
      - name: "eth0"
        ip: "10.10.10.12"
        mask: 24

  - name: "Voice-B"
    type: host
    position: {x: 1080, y: 450}
    interfaces:
      - name: "eth0"
        ip: "10.10.20.12"
        mask: 24

links:
  - {from_node: "Sales-A", from_interface: "eth0", to_node: "Access-SW1", to_interface: "sales", cost: 4}
  - {from_node: "Voice-A", from_interface: "eth0", to_node: "Access-SW1", to_interface: "voice", cost: 4}
  - {from_node: "Access-SW1", from_interface: "uplink", to_node: "Access-SW2", to_interface: "uplink", cost: 4}
  - {from_node: "Access-SW2", from_interface: "sales", to_node: "Sales-B", to_interface: "eth0", cost: 4}
  - {from_node: "Access-SW2", from_interface: "voice", to_node: "Voice-B", to_interface: "eth0", cost: 4}
