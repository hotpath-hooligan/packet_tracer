# Stress topology: 1 core router + 6 access switches + 30 hosts (37 devices).
# No positions or canvas: exercises the browser's automatic tiered layout.
topology:
  name: "Campus Stress Test"
  description: "One core router fans out to six access switches, each serving five hosts."
  summary: "37 devices across six /24 pods behind a single core router"
  default_source: "P1-H1"
  default_destination: "P6-H5"

